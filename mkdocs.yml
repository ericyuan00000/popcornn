site_name: popcornn
site_author: The popcornn authors
site_url: https://khegazy.github.io/popcornn/
site_description: >-
  Path Optimization with a Continuous Representation Neural Network —
  reaction path and transition state search on analytic potentials and
  machine-learned interatomic potentials.
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts: concepts.md
  - Configuration: configuration.md
  - Potentials: potentials.md
  - Paths: paths.md
  - Loss functions: loss-functions.md
  - Convergence: convergence.md
  - Memory & OOM: memory-and-oom.md
  - Advanced: advanced.md
  - Code reference: reference/ # keep me!
  - About:
      - example_docs/about/changelog.md
      - example_docs/about/conduct.md
      - example_docs/about/license.md

repo_url: https://github.com/khegazy/popcornn/
edit_uri: blob/main/docs/

theme:
  features:
    - content.action.edit
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.path
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - header.autohide
    - toc.follow
  name: material
  palette:
    primary: orange
    scheme: slate

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  # snippets resolves `---8<--- "FOO.md"` includes; base_path lets the
  # About pages pull CHANGELOG / CODE_OF_CONDUCT / LICENSE from the repo
  # root (one level above docs_dir).
  - pymdownx.snippets:
      base_path:
        - .
        - ..
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format ""
          name: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - autorefs
  - social
  - offline
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          import:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
          options:
            docstring_style: numpy
            docstring_section_style: list
            separate_signature: true
            merge_init_into_class: true
            docstring_options:
              ignore_init_summary: true
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
