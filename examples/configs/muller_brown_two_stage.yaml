# Two-stage Müller-Brown: pvre² warm-up then pvre fine-tune.
# Both stages at lr=1e-3 (the value at which pvre+n8d4 was shown to
# converge cleanly on 2026-05-07; the shipped recipe's stage-2 lr=1e-4
# is known to drift the path up — see
# project_popcornn_mb_two_stage_caveats.md). Stage-2 threshold 1e-1
# matches muller_brown_pseudo.yaml. Benchmarked alongside it in
# tests_ongoing/bench_mb_recipes.py.
initialization_params:
  images: [[-0.558, 1.442], [0.623, 0.028]]
  path_params:
    name: mlp
    n_embed: 8
    depth: 4
    activation: gelu
optimization_params:
  - potential_params:
      name: muller_brown
    integrator_params:
      path_integrand_names: pvre_squared
      rtol: 1.0e-1
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-3
      threshold: 1.0e+3
      patience: 10
    num_optimizer_iterations: 500
  - potential_params:
      name: muller_brown
    integrator_params:
      path_integrand_names: pvre
      rtol: 1.0e-2
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-3
      threshold: 1.0e-1
      patience: 10
    num_optimizer_iterations: 2000
