# Single-stage Müller-Brown: pseudo-Huber δ=1.0 on a small MLP (n4d2).
#
# Universal on-rule pair (atol = thr/10) at MB's scale: thr=1e-1 with
# atol=1e-2. Matches the lj13.yaml / gg3.yaml ratio (1e-4 / 1e-3 = 0.1)
# at MB's higher force scale (typical |F|·|v| ~ 100 vs chemistry ~ 1).
#
# δ scaling: chemistry systems use δ=0.1 (typical |s| ~ 1); MB needs δ
# scaled up 10× to match its higher force scale. Validated 3-seed (2026-05-12,
# off-rule atol=1e-1): all 3 PASS, mean wall ~33 s, max F_2 ≈ 0.6 under
# the |F|_2 < 1 target. δ=10 falls into vanishing-gradient regime;
# δ=0.1 explodes. See project_popcornn_mb_two_stage_caveats.
initialization_params:
  images: [[-0.558, 1.442], [0.623, 0.028]]
  path_params:
    name: mlp
    n_embed: 4
    depth: 2
    activation: gelu
optimization_params:
  - potential_params:
      name: muller_brown
    integrator_params:
      path_integrand_names: pvre_pseudo_huber
      path_integrand_kwargs:
        pvre_pseudo_huber:
          delta: 1.0
      rtol: 1.0e-1
      atol: 1.0e-2
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-3
      threshold: 1.0e-1
      patience: 1
    num_optimizer_iterations: 1000
