# Single-stage LJ-13: pseudo-Huber δ=0.1 on a small MLP (n_embed=4, depth=2).
#   - rtol: 1.0e-1                 (relative — barrier-invariant)
#   - atol: 1.0e-4                 (= thr/10, on-rule per atol_threshold_rule
#                                   project memory; the UMA chemistry default)
#   - threshold: 1.0e-3            (per-atom fmax target: < 0.05)
#
# Integrand: pvre_pseudo_huber with δ=0.1 — same loss family shipped on
# rxn0003 NewtonNet. Universal on-rule (atol=thr/10) and UMA-default
# (atol=1e-4, thr=1e-3) per the 2026-05-12 "ship UMA setting to NewtonNet
# and LJ13" directive.
#
# Capacity: n_embed=4, depth=2 → 6435 params (output 39-D × 4-wide
# hidden). The previous shipped n8d4 was 208k params — vastly
# over-parameterized for LJ-13's smooth landscape.
#
# find_ts: false is a mandatory workaround — integrator save_samples
# crashes when find_ts=True on LJ-13. The TS argmax for path-quality
# evaluation can be recovered post-hoc from a dense path grid.
initialization_params:
  images: examples/configs/lj13.xyz
  path_params:
    name: mlp
    n_embed: 4
    depth: 2
    activation: gelu
  num_record_points: 101
  device: cuda
  seed: 0
optimization_params:
  - potential_params:
      name: lennard_jones
      epsilon: 1.0
      sigma: 1.0
      cutoff: 3.0
    integrator_params:
      path_integrand_names: pvre_pseudo_huber
      path_integrand_kwargs:
        pvre_pseudo_huber:
          delta: 0.1
      rtol: 1.0e-1
      atol: 1.0e-4
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-3
      threshold: 1.0e-3
      patience: 1
      find_ts: false
    num_optimizer_iterations: 1000
