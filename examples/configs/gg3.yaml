initialization_params:
  images: configs/gg3.xyz
  path_params:
    name: mlp
    width: 128
    depth: 2
    activation: gelu
  track_loss: true
  track_ts: true
  num_record_points: 101
  device: cuda
  dtype: float32
  seed: 0
optimization_params:
  - potential_params:
      name: repel
    integrator_params:
      path_integrand_names: geodesic
      rtol: 0.5
      atol: 0.05
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-2
      threshold: 0.1
    num_optimizer_iterations: 1000
  - potential_params:
      name: uma
      model_name: uma-s-1p1
      task_name: omol
    integrator_params:
      path_integrand_names: pvre_pseudo_huber
      path_integrand_kwargs:
        pvre_pseudo_huber:
          delta: 0.05
      rtol: 0.5
      atol: 2.5e-3
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-2
      threshold: 5.0e-3
    num_optimizer_iterations: 1000
