# Single-stage Müller-Brown using pseudo-Huber δ=1.0.
# This is the smooth-loss recipe identified on 2026-05-07: pseudo at small
# δ stays in pvre's sign-driven gradient regime near the saddle, so the
# wide MLP (n_embed=8, depth=4) refines past the dip without rebounding.
# Cheaper per-call than pvre (≈ half the GK eval points; see
# tests_ongoing/eval_huber_speed.py).
initialization_params:
  images: [[-0.558, 1.442], [0.623, 0.028]]
  path_params:
    name: mlp
    n_embed: 8
    depth: 4
    activation: gelu
optimization_params:
  - potential_params:
      name: muller_brown
    integrator_params:
      path_integrand_names: pvre_pseudo_huber
      path_integrand_kwargs:
        pvre_pseudo_huber:
          delta: 1.0
      rtol: 1.0e-2
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-3
      threshold: 1.0e-1
      patience: 10
    num_optimizer_iterations: 2000
