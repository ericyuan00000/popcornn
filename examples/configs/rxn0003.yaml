initialization_params:
  images: configs/rxn0003.xyz
  path_params: 
    name: mlp
    n_embed: 1
    depth: 2
    activation: gelu
  num_record_points: 101
  # output_dir: output
  device: cuda
  seed: 0
optimization_params:  
  - potential_params:
      name: repel
    integrator_params: 
      path_integrand_names: geodesic
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-1
    num_optimizer_iterations: 1000
  - potential_params:
      name: uma
      model_name: uma-s-1p1
      task_name: omol
    integrator_params:
      path_integrand_names: projected_variational_reaction_energy
      rtol: 1.0e-2
      atol: 1.0e-2
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-3
      # threshold is system-dependent — initial |g|_inf for this UMA path is
      # ~1.5, plateau ~0.05; 0.1 fires when the loss curve has flattened.
      threshold: 1.0e-1
    num_optimizer_iterations: 1000
