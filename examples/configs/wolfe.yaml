# Wolfe-Schlegel (2D toy potential). Single-stage pseudo-Huber δ=1.0 on MLP (width=128, depth=2).
#
#   - integrand: pvre_pseudo_huber, δ=1.0
#     (δ = |F*_target|·‖Δx_RP‖ ≈ 1·3.75 ≈ 3.75; round DOWN to 1 per
#      safe-guess convention — matches MB's δ=1.0 since Wolfe shares MB's
#      ~1 force-scale convention)
#   - threshold metric: |g|_2 (shipped 2026-05-15)
#   - thr_2 = 2 = δ · 2·σ_min·fmax_target
#     (σ_min ≈ 1 ASSUMED via transfer from chem n4d2 — NOT measured on
#      Wolfe n4d2 under |g|_2; fmax_target = 1 (Wolfe/MB toy convention);
#      δ = 1.0)
#   - atol = 2e-2 (= thr_2/100, same ratio as chem/MB; empirically calibrated)
#   - rtol = 1e-1
#   - integrator method gk15 (popcornn default)
#
# CAVEATS (2026-05-17 derivation pass):
# - σ_min ≈ 1 transfer from chem to Wolfe 2D-toy is untested.
# - Demoted from prior n8d4 → n4d2 to match the rule's calibration arch.
#   n8d4 (208k params) was vastly over-parameterized for a 2D toy.
# - Prior recipe was single-stage pure pvre with thr=1.0 / atol=1e-2 /
#   rtol=1e-2 / lr=1e-3 (|g|_∞-era smoke-test settings, no patience set).
initialization_params:
  images: [[1.133, -1.486], [-1.166, 1.477]]
  path_params:
    name: mlp
    depth: 2
    activation: gelu
  device: cuda
  dtype: float32
optimization_params:
  - potential_params:
      name: wolfe_schlegel
    integrator_params:
      path_integrand_names: pvre_pseudo_huber
      path_integrand_kwargs:
        pvre_pseudo_huber:
          delta: 1.0
      rtol: 1.0e-1
      atol: 2.0e-2
    optimizer_params:
      optimizer:
        name: adam
        lr: 1.0e-3
      threshold: 2.0
      patience: 1
    num_optimizer_iterations: 2000
